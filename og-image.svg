<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4a9eff"/>
      <stop offset="0.5" stop-color="#9b6dff"/>
      <stop offset="1" stop-color="#ff6fa1"/>
    </linearGradient>
    <style>
      text { font-family: -apple-system, 'Segoe UI', system-ui, sans-serif; fill: #e8e8f0; }
      .title { font-weight: 800; font-size: 96px; letter-spacing: -0.02em; }
      .sub { font-weight: 500; font-size: 36px; fill: #a8a8b8; }
      .tag { font-weight: 700; font-size: 22px; fill: #4a9eff; letter-spacing: 0.08em; }
      .foot { font-weight: 500; font-size: 24px; fill: #6a6a7a; }
