  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>
  <text x="80" y="150" class="tag">BIG VIK CLAW · BETA</text>
  <text x="80" y="280" class="title">Desktop AI</text>
  <text x="80" y="390" class="title">with two sides.</text>
  <text x="80" y="470" class="sub">Vik builds. Viki posts.</text>
  <text x="80" y="520" class="sub">Your keys, your tools, your machine.</text>
  <text x="80" y="590" class="foot">claw.viktim.xyz · @fizznetwork/vik-mcp-server</text>
